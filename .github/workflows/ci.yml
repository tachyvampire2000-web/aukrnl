name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install GNAT and GPRbuild
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq gnat gprbuild
      - name: Build
        run: |
          mkdir -p obj bin
          gprbuild -P aura.gpr -q
      - name: Selftest
        run: ./bin/aura_selftest
